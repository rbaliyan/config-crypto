name: Release

on:
  push:
    tags:
      - 'v*'

permissions: read-all

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.25.8'

      - name: Run tests
        run: |
          go test -race ./...
          cd awskms && go test -race ./...
          cd ../gcpkms && go test -race ./...
          cd ../azurekv && go test -race ./...
          cd ../vault && go test -race ./...

      - name: Generate release notes
        id: notes
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          PREV_TAG=$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
          else
            RANGE="$TAG"
          fi
          {
            echo "notes<<EOF"
            echo "## What's Changed"
            echo ""
            git log "$RANGE" --pretty=format:"- %s" --no-merges
            echo ""
            echo ""
            echo "## Modules"
            echo ""
            echo "| Module | Install |"
            echo "|--------|---------|"
            echo "| Core | \`go get github.com/rbaliyan/config-crypto@${TAG}\` |"
            echo "| AWS KMS | \`go get github.com/rbaliyan/config-crypto/awskms@${TAG}\` |"
            echo "| GCP Cloud KMS | \`go get github.com/rbaliyan/config-crypto/gcpkms@${TAG}\` |"
            echo "| Azure Key Vault | \`go get github.com/rbaliyan/config-crypto/azurekv@${TAG}\` |"
            echo "| Vault Transit | \`go get github.com/rbaliyan/config-crypto/vault@${TAG}\` |"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          body: ${{ steps.notes.outputs.notes }}
          generate_release_notes: false

      - name: Download source archive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download "${{ github.ref_name }}" --archive=tar.gz --dir=dist

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v2
        with:
          subject-path: dist/*.tar.gz
