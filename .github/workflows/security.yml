name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions: read-all

jobs:
  vulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.25.8'

      - name: Run govulncheck
        run: |
          go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
          cd awskms && go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
          cd ../gcpkms && go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
          cd ../azurekv && go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
          cd ../vault && go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  gosec:
    name: GoSec (${{ matrix.module }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        module: [root, awskms, gcpkms, azurekv, vault, gpg]
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - name: Install GoSec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run GoSec
        run: |
          if [ "${{ matrix.module }}" = "root" ]; then
            gosec -fmt sarif -out gosec-results.sarif -severity medium -confidence medium -exclude-dir=awskms -exclude-dir=gcpkms -exclude-dir=azurekv -exclude-dir=vault -exclude-dir=gpg ./...
          else
            cd ${{ matrix.module }}
            gosec -fmt sarif -out ../gosec-results.sarif -severity medium -confidence medium ./...
          fi

      - name: Upload SARIF to GitHub Security
        if: always() && matrix.module == 'root'
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v3
        with:
          sarif_file: gosec-results.sarif
