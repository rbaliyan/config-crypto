name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

permissions: read-all

jobs:
  vulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: '1.25.8'

      - name: Run govulncheck
        run: |
          go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
          cd awskms && go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
          cd ../gcpkms && go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
          cd ../azurekv && go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
          cd ../vault && go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...

  gosec:
    name: GoSec SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - name: Install GoSec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.22.4

      - name: Run GoSec
        run: |
          gosec -severity medium -confidence medium ./...
          cd awskms && gosec -severity medium -confidence medium ./...
          cd ../gcpkms && gosec -severity medium -confidence medium ./...
          cd ../azurekv && gosec -severity medium -confidence medium ./...
          cd ../vault && gosec -severity medium -confidence medium ./...
          cd ../gpg && gosec -severity medium -confidence medium ./...
          cd .. && gosec -fmt sarif -out gosec-results.sarif -severity medium -confidence medium -exclude-dir=awskms -exclude-dir=gcpkms -exclude-dir=azurekv -exclude-dir=vault -exclude-dir=gpg ./...

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v3
        if: always()
        with:
          sarif_file: gosec-results.sarif
